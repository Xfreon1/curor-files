<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WTF Dashboard — Claude Code Study</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #e8e8e8;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 40px 24px 80px;
    }

    /* ── Header ── */
    .header {
      max-width: 900px;
      margin: 0 auto 40px;
    }
    .header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
    }
    .header p {
      color: #666;
      font-size: 14px;
      margin-top: 6px;
    }

    /* ── Progress bar ── */
    .progress-wrap {
      max-width: 900px;
      margin: 0 auto 36px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .progress-bar-track {
      flex: 1;
      height: 8px;
      background: #2a2a2a;
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #4ade80;
      border-radius: 4px;
      transition: width 0.4s ease;
    }
    .progress-label {
      font-size: 13px;
      color: #888;
      white-space: nowrap;
    }
    .progress-count {
      font-size: 22px;
      font-weight: 700;
      color: #4ade80;
      white-space: nowrap;
    }

    /* ── Phase tabs ── */
    .phase-tabs {
      max-width: 900px;
      margin: 0 auto 28px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .phase-tab {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid #2a2a2a;
      background: transparent;
      color: #888;
      font-size: 13px;
      font-family: 'Segoe UI', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .phase-tab:hover { border-color: #4ade80; color: #e8e8e8; }
    .phase-tab.active { background: #1e3a2a; border-color: #4ade80; color: #4ade80; }

    /* ── Day cards ── */
    .days {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .day-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .day-card:hover { border-color: #3a3a3a; }
    .day-card.completed { border-color: #1e3a2a; }
    .day-card.today { border-color: #4ade80; }

    .day-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 24px;
      cursor: pointer;
      user-select: none;
    }

    .day-number {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #555;
      text-transform: uppercase;
      min-width: 42px;
    }
    .day-card.today .day-number { color: #4ade80; }

    .day-date {
      font-size: 12px;
      color: #555;
      min-width: 90px;
    }
    .day-card.today .day-date { color: #4ade80; }

    .phase-badge {
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
      font-weight: 600;
    }
    .phase-foundation  { background: #1c2a3a; color: #60a5fa; }
    .phase-productivity { background: #2a1e3a; color: #c084fc; }
    .phase-automation  { background: #3a2a1a; color: #fb923c; }
    .phase-advanced    { background: #1e3a2a; color: #4ade80; }

    .day-title {
      flex: 1;
      font-size: 15px;
      font-weight: 600;
      color: #e8e8e8;
    }
    .day-card.completed .day-title { color: #555; }

    .day-done-count {
      font-size: 12px;
      color: #666;
      white-space: nowrap;
    }
    .day-done-count.all-done { color: #4ade80; }

    .chevron {
      color: #444;
      font-size: 12px;
      transition: transform 0.2s;
    }
    .day-card.open .chevron { transform: rotate(90deg); }

    /* ── Day body ── */
    .day-body {
      display: none;
      padding: 0 24px 20px;
      border-top: 1px solid #232323;
    }
    .day-card.open .day-body { display: block; }

    .section-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555;
      margin: 16px 0 8px;
    }

    .task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .task-item label {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      cursor: pointer;
      font-size: 14px;
      color: #ccc;
      line-height: 1.5;
      flex: 1;
    }
    .task-item input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border: 1.5px solid #3a3a3a;
      border-radius: 4px;
      background: #111;
      flex-shrink: 0;
      margin-top: 3px;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }
    .task-item input[type="checkbox"]:checked {
      background: #4ade80;
      border-color: #4ade80;
    }
    .task-item input[type="checkbox"]:checked::after {
      content: '✓';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 10px;
      color: #0f0f0f;
      font-weight: 700;
    }
    .task-item label.done { text-decoration: line-through; color: #444; }

    .docs-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }
    .doc-pill {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      background: #222;
      border: 1px solid #2e2e2e;
      color: #888;
    }

    .goal-box {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      color: #888;
      line-height: 1.5;
      margin-top: 16px;
    }
    .goal-box strong { color: #4ade80; }

    /* ── Today badge ── */
    .today-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      background: #4ade80;
      color: #0f0f0f;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    /* hidden filter */
    .day-card.hidden { display: none; }
  </style>
</head>
<body>

<div class="header">

  <p>20-day plan · 2026-03-20 → 2026-04-08 · Beginner to Advanced</p>

<div class="progress-wrap">

<div class="days" id="days"></div>

const TODAY = new Date().toISOString().slice(0, 10);

function phaseClass(phase) {
  return 'phase-' + phase.toLowerCase();
}

function getStorage() {
  try {
    return JSON.parse(localStorage.getItem('cc_study') || '{}');
  } catch { return {}; }
}
function saveStorage(data) {
  localStorage.setItem('cc_study', JSON.stringify(data));
}

function toggleTask(dayIndex, taskIndex, el) {
  const data = getStorage();
  const key = `d${dayIndex}_t${taskIndex}`;
  data[key] = el.checked;
  saveStorage(data);
  el.closest('label').classList.toggle('done', el.checked);
  updateProgress();
  updateDayCard(dayIndex);
}

function updateDayCard(dayIndex) {
  const data = getStorage();
  const d = DAYS[dayIndex];
  const total = d.tasks.length;
  const done = d.tasks.filter((_, ti) => data[`d${dayIndex}_t${ti}`]).length;
  const countEl = document.getElementById(`day-count-${dayIndex}`);
  if (countEl) {
    countEl.textContent = `${done}/${total}`;
    countEl.className = 'day-done-count' + (done === total ? ' all-done' : '');
  }
  const card = document.getElementById(`day-card-${dayIndex}`);
  if (card) {
    card.classList.toggle('completed', done === total);
  }
}

function updateProgress() {
  const data = getStorage();
  let total = 0, done = 0;
  DAYS.forEach((d, di) => {
    d.tasks.forEach((_, ti) => {
      total++;
      if (data[`d${di}_t${ti}`]) done++;
    });
  });
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('progressCount').textContent = `${done} / ${total}`;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `tasks complete · ${pct}%`;
}

function toggleCard(idx) {
  const card = document.getElementById(`day-card-${idx}`);
  card.classList.toggle('open');
}

function filterPhase(phase, btn) {
  document.querySelectorAll('.phase-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.day-card').forEach(card => {
    if (phase === 'all') {
      card.classList.remove('hidden');
    } else {
      const cardPhase = card.dataset.phase;
      card.classList.toggle('hidden', cardPhase !== phase);
    }
  });
}

function render() {
  const data = getStorage();
  const container = document.getElementById('days');
  container.innerHTML = '';

  DAYS.forEach((d, di) => {
    const isToday = d.date === TODAY;
    const total = d.tasks.length;
    const done = d.tasks.filter((_, ti) => data[`d${di}_t${ti}`]).length;
    const allDone = done === total;

    const card = document.createElement('div');
    card.className = 'day-card' + (allDone ? ' completed' : '') + (isToday ? ' today' : '');
    card.id = `day-card-${di}`;
    card.dataset.phase = d.phase;

    if (isToday) card.classList.add('open'); // auto-expand today

    const docsHtml = d.docs.length
      ? `<div class="section-label">Docs to read</div>
         <div class="docs-pills">${d.docs.map(doc => `<span class="doc-pill">${doc}.md</span>`).join('')}</div>`
      : '<div class="section-label" style="color:#555">Use the docs as reference today</div>';

    const tasksHtml = d.tasks.map((task, ti) => {
      const checked = data[`d${di}_t${ti}`] ? 'checked' : '';
      const doneClass = checked ? 'done' : '';
      return `<li class="task-item">
        <label class="${doneClass}">
          <input type="checkbox" ${checked} onchange="toggleTask(${di}, ${ti}, this)" />
          ${task}
        </label>
      </li>`;
    }).join('');

    card.innerHTML = `
      <div class="day-header" onclick="toggleCard(${di})">
        <span class="day-number">Day ${d.day}</span>
        <span class="day-date">${d.date}</span>
        <span class="phase-badge phase-${d.phase.toLowerCase()}">${d.phase}</span>
        <span class="day-title">${d.title}</span>
        ${isToday ? '<span class="today-badge">TODAY</span>' : ''}
        <span class="day-done-count${allDone ? ' all-done' : ''}" id="day-count-${di}">${done}/${total}</span>
        <span class="chevron">▶</span>
      </div>
      <div class="day-body">
        ${docsHtml}
        <div class="section-label">Practice tasks</div>
        <ul class="task-list">${tasksHtml}</ul>
        <div class="goal-box"><strong>Goal:</strong> ${d.goal}</div>
      </div>
    `;

    container.appendChild(card);
  });

  updateProgress();
}

render();
</script>
</body>
</html>
